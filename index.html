<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Earthquake Simulation</title>

<link rel="stylesheet"
href="https://cesium.com/downloads/cesiumjs/releases/1.142/Build/Cesium/Widgets/widgets.css">

<script src="https://cesium.com/downloads/cesiumjs/releases/1.142/Build/Cesium/Cesium.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    overflow: hidden;
}

#controls {
    position: absolute;
    top: 15px;
    left: 15px;
    z-index: 999;
    background: rgba(255,255,255,0.92);
    padding: 12px;
    border-radius: 10px;
    width: 220px;
}

#cesiumContainer {
    position: absolute;
    top: 0;
    left: 260px;
    right: 0;
    bottom: 0;
}
</style>
</head>

<body>

<div id="controls">
    <h3>Region Switcher</h3>
    <select id="regionSelect">
        <option value="all">All Regions</option>
        <option value="north">North</option>
        <option value="qc">Quezon City</option>
        <option value="pasig">Pasig / Marikina</option>
        <option value="south">South</option>
    </select>
</div>

<div id="cesiumContainer"></div>

<script>
Cesium.Ion.defaultAccessToken =
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJkYTUzZmI1OS0wNjUxLTQxYjktOGMzMC1lODQyNzQ3YzIxZGMiLCJpZCI6NDUwNDYyLCJzdWIiOiJqb2hubWVkaWphMTQiLCJpc3MiOiJodHRwczovL2FwaS5jZXNpdW0uY29tIiwiYXVkIjoiam9obm1lZGlqYTE0X2RlZmF1bHQiLCJpYXQiOjE3ODI3NjgwNzd9.jmAmq8mS_RcWJ0ZHunsG1neH_Mry1-3s4Ldu-NH7HoY";

const viewer = new Cesium.Viewer("cesiumContainer", {
    animation: false,
    timeline: false,
    infoBox: true,
    geocoder: true,
    baseLayerPicker: true
});

// Terrain (safe)
viewer.terrainProvider = new Cesium.EllipsoidTerrainProvider();

// =========================
// CAMERA FOCUS
// =========================
viewer.camera.flyTo({
    destination: Cesium.Cartesian3.fromDegrees(121.085, 14.69, 22000)
});

// =========================
// WEST VALLEY FAULT (FIXED ANIMATION)
// =========================
const westValleyFault = [
121.0470,14.8800,121.0550,14.8600,121.0600,14.8350,
121.0750,14.8050,121.0900,14.7750,121.1050,14.7450,
121.0900,14.7150,121.0850,14.7000,121.0920,14.6900,
121.1050,14.6700,121.1150,14.6500,121.1200,14.6300,
121.1100,14.6100,121.1000,14.5900,121.0950,14.5700,
121.0850,14.5500,121.0700,14.5200
];

// ✔ SINGLE STABLE FAULT ENTITY
viewer.entities.add({
    name: "West Valley Fault",
    polyline: {
        positions: new Cesium.CallbackProperty(() => {
            const offset = Math.sin(Date.now() * 0.002) * 0.0003;

            return Cesium.Cartesian3.fromDegreesArray(
                westValleyFault.map((v, i) =>
                    i % 2 === 0 ? v + offset : v
                )
            );
        }, false),
        width: 4,
        material: Cesium.Color.ORANGERED
    }
});

// =========================
// 🌊 SEISMIC WAVE
// =========================
let waveRadius = 1000;

viewer.entities.add({
    position: Cesium.Cartesian3.fromDegrees(121.09, 14.69),
    ellipse: {
        semiMajorAxis: new Cesium.CallbackProperty(() => waveRadius, false),
        semiMinorAxis: new Cesium.CallbackProperty(() => waveRadius, false),
        material: Cesium.Color.RED.withAlpha(0.12)
    }
});

setInterval(() => {
    waveRadius += 1500;
    if (waveRadius > 300000) waveRadius = 1000;
}, 60);

// =========================
// 📊 DASHBOARD
// =========================
const dashboard = document.createElement("div");
dashboard.style = `
position:absolute; top:10px; right:10px;
background:white; padding:10px;
border-radius:10px;
z-index:999;
width:220px;
font-family:Arial;
`;
document.body.appendChild(dashboard);

// =========================
// RISK NODES
// =========================
const riskNodes = [
{region:"north", name:"San Jose del Monte", lon:121.0450, lat:14.8050},
{region:"north", name:"Rodriguez–San Mateo", lon:121.1500, lat:14.7200},

{region:"qc", name:"Batasan Hills", lon:121.0850, lat:14.6900},
{region:"qc", name:"Loyola Heights", lon:121.0750, lat:14.6500},

{region:"pasig", name:"Marikina", lon:121.1000, lat:14.6600},
{region:"pasig", name:"Pasig", lon:121.0800, lat:14.5900},

{region:"south", name:"Taguig", lon:121.0500, lat:14.5200},
{region:"south", name:"Muntinlupa", lon:121.0400, lat:14.4500}
];

let markers = [];

function render(region) {

markers.forEach(m => viewer.entities.remove(m));
markers = [];

let count = 0;

riskNodes
.filter(n => region === "all" || n.region === region)
.forEach(n => {

    const entity = viewer.entities.add({
        position: Cesium.Cartesian3.fromDegrees(n.lon, n.lat),
        point: {
            pixelSize: 10,
            color: Cesium.Color.YELLOW
        },
        label: {
            text: n.name,
            font: "12px sans-serif",
            pixelOffset: new Cesium.Cartesian2(0, -18),
            disableDepthTestDistance: Number.POSITIVE_INFINITY
        }
    });

    markers.push(entity);
    count++;
});

dashboard.innerHTML = `
<b>Seismic Risk Panel</b><br>
Visible zones: ${count}<br>
Fault system: West Valley Fault
`;
}

render("all");

document.getElementById("regionSelect")
.addEventListener("change", e => render(e.target.value));

// =========================
// 3D BUILDINGS
// =========================
viewer.scene.primitives.add(Cesium.createOsmBuildings());
</script>

</body>
</html>
