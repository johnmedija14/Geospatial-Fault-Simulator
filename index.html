<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Earthquake Simulation</title>

<link rel="stylesheet"
href="https://cesium.com/downloads/cesiumjs/releases/1.142/Build/Cesium/Widgets/widgets.css">

<script src="https://cesium.com/downloads/cesiumjs/releases/1.142/Build/Cesium/Cesium.js"></script>

<style>
body { margin:0; font-family:Arial; }
#cesiumContainer { width:100%; height:100vh; }

#controls {
    position:absolute;
    top:10px;
    left:10px;
    z-index:999;
    background:white;
    padding:10px;
    border-radius:8px;
}
</style>
</head>

<body>

<div id="controls">
    <h3>Region Switcher</h3>
    <select id="regionSelect">
        <option value="all">All Regions</option>
        <option value="north">North</option>
        <option value="qc">Quezon City</option>
        <option value="pasig">Pasig / Marikina</option>
        <option value="south">South</option>
    </select>
</div>

<div id="cesiumContainer"></div>

<script>
Cesium.Ion.defaultAccessToken = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiI4YTI4ZjcwZi02YTgxLTRhMjYtYjg4OC03YjQ2ZDcwM2FjNjYiLCJpZCI6NDUwNDYyLCJzdWIiOiJqb2hubWVkaWphMTQiLCJpc3MiOiJodHRwczovL2FwaS5jZXNpdW0uY29tIiwiYXVkIjoiam9obm1lZGlqYTE0X2RlZmF1bHQiLCJpYXQiOjE3ODI3NjU0MDV9.p7cfQhS6SZ900y95Ll-5bmgITgleEBJGGQpNL9iWI_w";

const viewer = new Cesium.Viewer("cesiumContainer", {
    animation:false,
    timeline:false,
    infoBox:true,
    geocoder:true,
    baseLayerPicker:true
});

viewer.scene.globe.depthTestAgainstTerrain = false;

// =====================
// CAMERA FIX (IMPORTANT)
// =====================
viewer.camera.setView({
    destination: Cesium.Cartesian3.fromDegrees(121.085, 14.69, 12000)
});

// =====================
// FAULT LINE
// =====================
const westValleyFault = [
121.0470,14.8800,121.0550,14.8600,121.0600,14.8350,
121.0750,14.8050,121.0900,14.7750,121.1050,14.7450,
121.0900,14.7150,121.0850,14.7000,121.0920,14.6900,
121.1050,14.6700,121.1150,14.6500,121.1200,14.6300,
121.1100,14.6100,121.1000,14.5900,121.0950,14.5700,
121.0850,14.5500,121.0700,14.5200
];

viewer.entities.add({
name:"West Valley Fault",
polyline:{
positions:Cesium.Cartesian3.fromDegreesArray(westValleyFault),
width:5,
material:Cesium.Color.ORANGERED
}
});

// =====================
// DISTANCE + INTENSITY
// =====================
function getDistanceKm(lon,lat,fault){
let min=Infinity;
for(let i=0;i<fault.length;i+=2){
const d=Cesium.Cartesian3.distance(
Cesium.Cartesian3.fromDegrees(lon,lat),
Cesium.Cartesian3.fromDegrees(fault[i],fault[i+1])
)/1000;
if(d<min)min=d;
}
return min;
}

function getIntensity(d){
if(d<2)return 1;
if(d<5)return 0.7;
if(d<10)return 0.4;
return 0.2;
}

// =====================
// FULL RISK NODES (FIXED + COMPLETE)
// =====================
const riskNodes = [

{region:"north",name:"San Jose del Monte (Kaypian / Tungko / Muzon)",lon:121.0450,lat:14.8050,population:"650k",reason:"Northern WVF proximity"},
{region:"north",name:"Rodriguez–San Mateo Border",lon:121.1500,lat:14.7200,population:"400k",reason:"Soft soil amplification"},

{region:"qc",name:"Batasan Hills – Commonwealth",lon:121.0850,lat:14.6900,population:"600k",reason:"Direct fault zone"},
{region:"qc",name:"Matandang Balara / Loyola",lon:121.0750,lat:14.6500,population:"300k",reason:"Near fault corridor"},
{region:"qc",name:"White Plains / Greenmeadows",lon:121.0600,lat:14.6100,population:"250k",reason:"Dense subdivision zone"},

{region:"pasig",name:"Marikina Valley Basin",lon:121.1000,lat:14.6600,population:"500k",reason:"Liquefaction risk"},
{region:"pasig",name:"Pasig Ugong / Valle Verde",lon:121.0800,lat:14.5900,population:"400k",reason:"Urban seismic zone"},

{region:"south",name:"Taguig Bicutan",lon:121.0500,lat:14.5200,population:"450k",reason:"Southern extension"},
{region:"south",name:"Muntinlupa Alabang",lon:121.0200,lat:14.4300,population:"350k",reason:"Southern hazard zone"}
];

let nodeEntities=[];

// =====================
// RENDER SYSTEM
// =====================
function render(region){

nodeEntities.forEach(e=>viewer.entities.remove(e));
nodeEntities=[];

riskNodes
.filter(n=>region==="all"||n.region===region)
.forEach(node=>{

const dist=getDistanceKm(node.lon,node.lat,westValleyFault);
const intensity=getIntensity(dist);

const color=
intensity>0.8?Cesium.Color.RED:
intensity>0.5?Cesium.Color.ORANGE:
intensity>0.3?Cesium.Color.YELLOW:
Cesium.Color.GREEN;

const entity=viewer.entities.add({
position:Cesium.Cartesian3.fromDegrees(node.lon,node.lat),

point:{pixelSize:12,color},

label:{
text:node.name,
font:"12px sans-serif",
pixelOffset:new Cesium.Cartesian2(0,-20)
},

description:`
<h2>${node.name}</h2>
<p><b>Population:</b> ${node.population}</p>
<p><b>Risk:</b> ${node.reason}</p>
<p><b>Distance:</b> ${dist.toFixed(2)} km</p>
`
});

nodeEntities.push(entity);
});
}

render("all");

// =====================
// SWITCHER
// =====================
document.getElementById("regionSelect")
.addEventListener("change",e=>render(e.target.value));

// =====================
// EARTHQUAKE WAVE
// =====================
let waveRadius=1000;

viewer.entities.add({
position:Cesium.Cartesian3.fromDegrees(121.09,14.69),
ellipse:{
semiMajorAxis:new Cesium.CallbackProperty(()=>waveRadius,false),
semiMinorAxis:new Cesium.CallbackProperty(()=>waveRadius,false),
material:Cesium.Color.RED.withAlpha(0.15)
}
});

const handler=new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);

handler.setInputAction(()=>{

waveRadius=1000;
let interval=setInterval(()=>{
waveRadius+=1200;
if(waveRadius>250000)clearInterval(interval);
},80);

console.log("Earthquake triggered");

},Cesium.ScreenSpaceEventType.LEFT_CLICK);

console.log("Loaded successfully");
</script>

</body>
</html>
