<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Earthquake Simulation</title>

<link rel="stylesheet"
  href="https://cesium.com/downloads/cesiumjs/releases/1.142/Build/Cesium/Widgets/widgets.css">

<script src="https://cesium.com/downloads/cesiumjs/releases/1.142/Build/Cesium/Cesium.js"></script>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    margin: 0;
}

#cesiumContainer {
    width: 100%;
    height: 90vh;
}

#ui {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 999;
    background: white;
    padding: 10px;
    border-radius: 8px;
}

button {
    margin: 4px;
    padding: 6px 10px;
    cursor: pointer;
}
</style>
</head>

<body>

<div id="ui">
    <button onclick="goAll()">ALL</button>
    <button onclick="goNorth()">NORTH</button>
    <button onclick="goQC()">QC</button>
    <button onclick="goMarikina()">MARIKINA</button>
    <button onclick="goSouth()">SOUTH</button>
</div>

<div id="cesiumContainer"></div>

<script>

Cesium.Ion.defaultAccessToken = "YOUR_TOKEN";

const viewer = new Cesium.Viewer('cesiumContainer', {
    animation: false,
    timeline: false,
    infoBox: true
});

viewer.scene.globe.depthTestAgainstTerrain = false;

// =====================
// FAULT LINE
// =====================
const westValleyFault = [
121.0470,14.8800,121.0550,14.8600,121.0600,14.8350,
121.0750,14.8050,121.0900,14.7750,121.1050,14.7450,
121.0900,14.7150,121.0850,14.7000,121.0920,14.6900,
121.1050,14.6700,121.1150,14.6500,121.1200,14.6300,
121.1100,14.6100,121.1000,14.5900,121.0950,14.5700,
121.0850,14.5500,121.0700,14.5200
];

viewer.entities.add({
    polyline: {
        positions: Cesium.Cartesian3.fromDegreesArray(westValleyFault),
        width: 5,
        material: Cesium.Color.ORANGERED
    }
});

// =====================
// DISTANCE FUNCTION
// =====================
function getDistanceKm(lon, lat) {
    let min = 999999;

    for (let i = 0; i < westValleyFault.length; i += 2) {
        const d = Cesium.Cartesian3.distance(
            Cesium.Cartesian3.fromDegrees(lon, lat),
            Cesium.Cartesian3.fromDegrees(westValleyFault[i], westValleyFault[i+1])
        ) / 1000;

        if (d < min) min = d;
    }
    return min;
}

function getIntensity(d) {
    return d < 2 ? 1 : d < 5 ? 0.7 : d < 10 ? 0.4 : 0.2;
}

// =====================
// RISK NODES (ALL REGIONS)
// =====================
const riskNodes = [
{ name:"San Jose del Monte", lon:121.0450, lat:14.8050, population:"650k", region:"north" },
{ name:"Rodriguez", lon:121.1500, lat:14.7200, population:"400k", region:"north" },

{ name:"Batasan QC", lon:121.0850, lat:14.6900, population:"600k", region:"qc" },
{ name:"Loyola Heights", lon:121.0750, lat:14.6500, population:"300k", region:"qc" },
{ name:"White Plains", lon:121.0600, lat:14.6100, population:"250k", region:"qc" },

{ name:"Marikina", lon:121.1000, lat:14.6600, population:"500k", region:"marikina" },

{ name:"Pasig", lon:121.0800, lat:14.5900, population:"400k", region:"south" },
{ name:"Taguig", lon:121.0500, lat:14.5200, population:"450k", region:"south" },
{ name:"Muntinlupa", lon:121.0400, lat:14.4500, population:"350k", region:"south" }
];

// =====================
// RENDER FUNCTION
// =====================
function render(region="all") {

viewer.entities.removeAll();

viewer.entities.add({
    polyline: {
        positions: Cesium.Cartesian3.fromDegreesArray(westValleyFault),
        width: 5,
        material: Cesium.Color.ORANGERED
    }
});

riskNodes.forEach(n => {

    if (region !== "all" && n.region !== region) return;

    const d = getDistanceKm(n.lon, n.lat);
    const intensity = getIntensity(d);

    viewer.entities.add({
        position: Cesium.Cartesian3.fromDegrees(n.lon, n.lat),

        ellipse: {
            semiMajorAxis: 8000 * intensity,
            semiMinorAxis: 8000 * intensity,
            material: Cesium.Color.RED.withAlpha(0.2)
        }
    });

    viewer.entities.add({
        position: Cesium.Cartesian3.fromDegrees(n.lon, n.lat),

        point: {
            pixelSize: 12,
            color: Cesium.Color.YELLOW,
            outlineColor: Cesium.Color.BLACK
        },

        label: {
            text: n.name,
            font: "12px sans-serif",
            pixelOffset: new Cesium.Cartesian2(0,-20)
        },

        description: `
            <h2>${n.name}</h2>
            <p><b>Population:</b> ${n.population}</p>
            <p><b>Region:</b> ${n.region}</p>
            <p><b>Distance to Fault:</b> ${d.toFixed(2)} km</p>
        `
    });

});
}

// =====================
// REGION CONTROLS
// =====================
function goAll(){
render("all");
viewer.camera.flyTo({destination: Cesium.Cartesian3.fromDegrees(121.05,14.65,300000)});
}

function goNorth(){
render("north");
viewer.camera.flyTo({destination: Cesium.Cartesian3.fromDegrees(121.10,14.78,150000)});
}

function goQC(){
render("qc");
viewer.camera.flyTo({destination: Cesium.Cartesian3.fromDegrees(121.08,14.69,80000)});
}

function goMarikina(){
render("marikina");
viewer.camera.flyTo({destination: Cesium.Cartesian3.fromDegrees(121.10,14.66,80000)});
}

function goSouth(){
render("south");
viewer.camera.flyTo({destination: Cesium.Cartesian3.fromDegrees(121.05,14.50,150000)});
}

// INIT
render("all");
goAll();

</script>

</body>
</html>
