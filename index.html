<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Earthquake Simulation</title>

<link rel="stylesheet"
href="https://cesium.com/downloads/cesiumjs/releases/1.142/Build/Cesium/Widgets/widgets.css">

<script src="https://cesium.com/downloads/cesiumjs/releases/1.142/Build/Cesium/Cesium.js"></script>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial;
}

#cesiumContainer {
    position: absolute;
    top: 0;
    left: 260px;
    right: 0;
    bottom: 0;
}

#controls {
    position: absolute;
    top: 15px;
    left: 15px;
    z-index: 999;
    background: rgba(255,255,255,0.92);
    padding: 12px;
    border-radius: 10px;
    width: 220px;
}

#errorBox {
    position: absolute;
    bottom: 10px;
    left: 10px;
    z-index: 9999;
    background: rgba(0,0,0,0.8);
    color: #ff4d4d;
    padding: 10px;
    font-size: 12px;
    display: none;
}
</style>
</head>

<body>

<div id="controls">
    <h3>Region Switcher</h3>
    <select id="regionSelect">
        <option value="all">All Regions</option>
        <option value="north">North</option>
        <option value="qc">Quezon City</option>
        <option value="pasig">Pasig / Marikina</option>
        <option value="south">South</option>
    </select>
</div>

<div id="cesiumContainer"></div>
<div id="errorBox"></div>

<script>
window.onerror = function(msg, src, line) {
    const box = document.getElementById("errorBox");
    box.style.display = "block";
    box.innerHTML += `<div>${msg} (line ${line})</div>`;
};

Cesium.Ion.defaultAccessToken = "YOUR_CESIUM_TOKEN_HERE";

const viewer = new Cesium.Viewer("cesiumContainer", {
    animation: false,
    timeline: false,
    infoBox: true,
    geocoder: true,
    baseLayerPicker: true,
    terrainProvider: new Cesium.EllipsoidTerrainProvider()
});

Cesium.createWorldTerrainAsync()
.then(t => viewer.terrainProvider = t);

viewer.camera.flyTo({
    destination: Cesium.Cartesian3.fromDegrees(121.085, 14.69, 22000)
});

const westValleyFault = [
121.0470,14.8800,121.0550,14.8600,121.0600,14.8350,
121.0750,14.8050,121.0900,14.7750,121.1050,14.7450,
121.0900,14.7150,121.0850,14.7000,121.0920,14.6900,
121.1050,14.6700,121.1150,14.6500,121.1200,14.6300,
121.1100,14.6100,121.1000,14.5900,121.0950,14.5700,
121.0850,14.5500,121.0700,14.5200
];

/* =========================
🌋 FAULT CORE (RUPTURE WAVE)
========================= */
let ruptureT = 0;

viewer.entities.add({
    polyline: {
        positions: new Cesium.CallbackProperty(() => {
            ruptureT += 0.002;

            return Cesium.Cartesian3.fromDegreesArray(
                westValleyFault.map((v, i) => {
                    const wave = Math.sin(ruptureT + i * 0.2) * 0.00015;
                    const base = Math.sin(Date.now()*0.002) * 0.0002;
                    return i % 2 === 0 ? v + base + wave : v;
                })
            );
        }, false),
        width: 4,
        material: Cesium.Color.ORANGERED
    }
});

/* =========================
🟠 PROXIMITY BUFFER ZONE
========================= */
const left = [];
const right = [];

for (let i = 0; i < westValleyFault.length; i += 2) {
    const lon = westValleyFault[i];
    const lat = westValleyFault[i + 1];

    left.push(lon - 0.012, lat + 0.006);
    right.push(lon + 0.012, lat - 0.006);
}

viewer.entities.add({
    polygon: {
        hierarchy: Cesium.Cartesian3.fromDegreesArray(
            left.concat(right.reverse())
        ),
        material: Cesium.Color.RED.withAlpha(0.10),
        outline: true,
        outlineColor: Cesium.Color.DARKRED
    }
});

/* =========================
🌊 SEISMIC WAVE (SMOOTHER)
========================= */
let waveRadius = 1000;

viewer.entities.add({
    position: Cesium.Cartesian3.fromDegrees(121.09, 14.69),
    ellipse: {
        semiMajorAxis: new Cesium.CallbackProperty(() => waveRadius, false),
        semiMinorAxis: new Cesium.CallbackProperty(() => waveRadius, false),
        material: Cesium.Color.RED.withAlpha(0.08)
    }
});

setInterval(() => {
    waveRadius += 1200;
    if (waveRadius > 280000) waveRadius = 1000;
}, 70);

/* =========================
📊 DASHBOARD
========================= */
const dashboard = document.createElement("div");
dashboard.style = `
position:absolute;
top:10px;
right:10px;
background:white;
padding:10px;
border-radius:10px;
z-index:999;
width:220px;
font-family:Arial;
`;
document.body.appendChild(dashboard);

/* =========================
RISK NODES
========================= */
const riskNodes = [
{region:"north", name:"San Jose del Monte", lon:121.0450, lat:14.8050},
{region:"north", name:"Rodriguez–San Mateo", lon:121.1500, lat:14.7200},
{region:"qc", name:"Batasan Hills", lon:121.0850, lat:14.6900},
{region:"qc", name:"Loyola Heights", lon:121.0750, lat:14.6500},
{region:"pasig", name:"Marikina", lon:121.1000, lat:14.6600},
{region:"pasig", name:"Pasig", lon:121.0800, lat:14.5900},
{region:"south", name:"Taguig", lon:121.0500, lat:14.5200},
{region:"south", name:"Muntinlupa", lon:121.0400, lat:14.4500}
];

let markers = [];

function render(region) {
markers.forEach(m => viewer.entities.remove(m));
markers = [];

let count = 0;

riskNodes
.filter(n => region === "all" || n.region === region)
.forEach(n => {

    const entity = viewer.entities.add({
        position: Cesium.Cartesian3.fromDegrees(n.lon, n.lat),
        point: { pixelSize: 10, color: Cesium.Color.YELLOW },
        label: {
            text: n.name,
            font: "12px sans-serif",
            pixelOffset: new Cesium.Cartesian2(0, -18)
        }
    });

    markers.push(entity);
    count++;
});

dashboard.innerHTML = `
<b>Seismic Risk Panel</b><br>
Zones: ${count}<br>
Fault system: West Valley Fault<br>
Buffer zone: ACTIVE
`;
}

render("all");

document.getElementById("regionSelect")
.addEventListener("change", e => render(e.target.value));

viewer.scene.primitives.add(Cesium.createOsmBuildings());
</script>

</body>
</html>
